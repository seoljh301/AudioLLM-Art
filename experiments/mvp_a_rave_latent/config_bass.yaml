model:
  path: checkpoints/rave/guitar_iil_b2048_r48000_z16.ts
  device: "cuda:1"

perturb:
  noise_scale: 0.12
  noise_mode: smoothed
  noise_smooth: 0.95
  dim_dropout: 0.10

render:
  chunk_seconds: 4.0
  overlap_seconds: 0.05

mix:
  dry_wet: 0.85               # Even higher wet to see the contrast
  rms_match: true
  limiter: true
  limiter_drive: 1.2
  low_anchor_hz: 150.0        # PROTECT LOW END

governor:
  enabled: true
  min_wet: 0.20
  flatness_max: 0.60
  rms_min: 0.0001
  rms_max: 0.90
  centroid_max_ratio: 0.45

seed: 555
